                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <label for="phone">Contact Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your contact number" required>


                    
                </div>

                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <label for="message">How can i help?</label>
                    <textarea id="message" name="message" rows="5" placeholder="Message" required></textarea>
                </div>
                <button onclick="alert('Form submitted successfully.')" type="submit">Submit Details</button>
            </form>
